# SDK profile contract
#
# Inputs:
# - source: where wheel inputs come from. source.type=repo requires source.path
#   and markers; source.type=wheels requires source.wheels.skills/baseline.
# - build: how skills/baseline wheels are prepared. build.type is required:
#   uv_wheel builds with "uv build"; provided_wheels stages source.wheels.
# - docker: build-time SDK verification and import/version checks.
# - skills.setup: how SDK skills are installed in the skills image. type is
#   required: command runs install_command; copy stages source_path; none skips.
#
# Outputs:
# - dist/skills/*.whl and dist/baseline/*.whl in the Docker build context.
# - SDK Docker build args for package/import/version checks and skills setup.
# - ${BENCHMARK_AGENT_HOME}/skills plus install/list metadata in the skills image.
#
# Optional defaults:
# - build.variants.<name>.label defaults to the variant name.
# - build.variants.<name>.reuse_existing defaults to true.
# - build.env_name/build_env_value are only needed by SDKs with build toggles.
# - docker.version_command may be omitted when no CLI version check is needed.
# - skills.setup.install_output defaults to skills_build_install.json.
# - skills.setup.list_output defaults to skills_list.json.
# - skills.setup.expected_source defaults to local_sdk_wheel.
# - evaluation.criteria_path is an optional repo-relative path to evaluation
#   criteria. It can be a harness-compatible YAML rules file/directory; NVFLARE
#   also supports the SDK-native dev_tools/agent/skill_evals directory. When it
#   is absent, bin/build.sh requires --evaluation-criteria.

name: nvflare
display_name: NVIDIA FLARE
package_name: nvflare
import_name: nvflare

# Required source input for build.type=uv_wheel.
source:
  type: repo
  path: "{repo_root}"
  markers:
    - pyproject.toml
    - nvflare/

# Required wheel preparation contract.
#
# NVFLARE PR #4837 removed the wheel-bundling build hook
# (NVFLARE_PACKAGE_AGENT_SKILLS / *no_skills* wheels): the SDK wheel is now
# IDENTICAL in both images, and the skills-vs-baseline distinction is purely
# skills.setup (the npx skills add step runs only in the skills image). Both
# variants therefore stage the same nvflare wheel; the build fails if they
# somehow stage different bytes (a stale dist/ wheel would corrupt the A/B).
build:
  type: uv_wheel
  variants:
    skills:
      label: skills
      wheel_globs:
        - nvflare-*.whl
        - nvflare_nightly-*.whl
    baseline:
      label: baseline
      wheel_globs:
        - nvflare-*.whl
        - nvflare_nightly-*.whl

# Optional SDK verification run after wheel install.
docker:
  version_command: nvflare --version

# Required skills setup contract for the skills image.
#
# NVFLARE removed the `nvflare agent skills install` CLI; skills now install
# via the Agent Skills CLI from the SDK checkout's local skills/ tree.
# - source_path is staged into the Docker build context as /tmp/sdk_skills.
# - source_ref is the path passed to `npx skills add`; override one build with
#   BENCHMARK_SKILLS_SOURCE_REF to install from a published repo/branch instead.
# - The command runs from /workspace (the image WORKDIR), so the CLI's
#   project-scoped install lands at /workspace/.claude/skills and
#   /workspace/.codex/skills — exactly the agents' configured skill roots
#   (${BENCHMARK_AGENT_HOME}/skills).
# - The Skills CLI agent id for the claude benchmark agent is `claude-code`;
#   other agents (codex) install their own id ALONGSIDE claude-code so the
#   claude-based report/investigator tooling in the same image sees skills too.
# - No list_command: the harness's generic lister walks the installed target.
skills:
  setup:
    type: command
    # --copy (not the default symlinks): the harness's capture/verification
    # walkers skip symlinks by design. The CLI's own --yes must come AFTER the
    # args (npx swallows a leading --yes), or it stops at an interactive skill
    # selector. -a is repeated per agent; comma lists are rejected. The final
    # bridge copies the CLI's canonical ./.agents/skills into the benchmark's
    # contracted skill root when the CLI's per-agent layout differs from it.
    source_path: "{repo_root}/skills"
    install_command: >-
      skills_agent="${BENCHMARK_DOCKER_AGENT}";
      if [ "${skills_agent}" = "claude" ] || [ "${skills_agent}" = "claude-code" ];
      then agent_flags="-a claude-code";
      else agent_flags="-a claude-code -a ${skills_agent}";
      fi;
      npx --yes skills add "${SKILLS_SOURCE_REF}" ${agent_flags} --copy --yes
      && mkdir -p "${BENCHMARK_AGENT_HOME}/skills"
      && if [ -d .agents/skills ] && [ -z "$(ls -A "${BENCHMARK_AGENT_HOME}/skills" 2>/dev/null)" ];
      then cp -R .agents/skills/. "${BENCHMARK_AGENT_HOME}/skills/"; fi
    # Default to the staged local SDK checkout so unpublished/local branches work
    # without pushing. Explicit published forms also work via
    # BENCHMARK_SKILLS_SOURCE_REF: owner/repo#branch or a full URL#branch.
    source_ref: "/tmp/sdk_skills"
    install_output: skills_build_install.json
    list_output: skills_list.json
    expected_source: skills_cli

evaluation:
  criteria_path: dev_tools/agent/skill_evals
