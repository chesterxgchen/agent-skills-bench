# Federated-statistics benchmark, headerless tabular variant: the CSVs carry
# no header row and the README lists the 27 column names. Adds the
# names-honored criterion via the data-format=no_header overlay; the
# acceptance checks additionally fail any invented column name in the output.
name: fedstats-noheader
prompt: prompt-noheader.txt
agents:
  - claude
workflows:
  - name: FEDSTATS
jobs:
  - path: ~/projects/flare_test/tabular_no_header
    name: fedstats-noheader
    scale: small
evaluation_task: federated-statistics
evaluation_selectors:
  data-format: no_header
result_artifact:
  glob: "**/simulate_job/statistics/*.json"
  format: json
  description: aggregated federated statistics output from the simulator workspace
acceptance_checks:
  script: fedstats_checks.py
  timeout_seconds: 300
quality_gate:
  required_validation_metric_status: [not_required]
comparison:
  type: mode_ablation
  modes: [without_skills, with_skills]
  repeats: 3
