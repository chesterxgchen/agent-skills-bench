# NVFLARE conversion task — SDK-specific criteria.
#
# Composed AFTER the shared SDK-agnostic layer
# (config/evaluation/common/tasks/conversion/common.yaml — partitioning,
# class_weighting, metric_reporting, data_packaging, metric_progression).
# Only criteria that speak NVFLARE vocabulary live here; framework judgments
# live in the sibling overlays (pytorch.yaml, lightning.yaml, ...), which
# replace whole signals.
#
# Matchers (against the lower-cased evidence string): contains /
# contains_any, trend (numeric series direction), when_context (caller
# context gate). Empty / "not captured" evidence is always "unknown";
# unmatched evidence gets the manifest's default_verdict.
signals:
  training_control:
    label: "Conversion: client training/control path"
    rules:
      - contains: "lightning client api patch"
        verdict: good
      - contains: "manual client api loop"
        when_context: {target_framework: lightning}
        verdict: caution
      - contains: "manual client api loop"
        verdict: good
  execution_model:
    label: "Conversion: client execution/model exchange"
    rules:
      - contains_any: ["external client process", "in-process client api executor"]
        verdict: good
