# NVFLARE conversion task — framework-agnostic evaluation criteria.
#
# Per signal: ordered rules, first match wins. Matchers (against the
# lower-cased evidence string):
#   contains / contains_any — substring match
#   trend                   — direction of the numeric series in the evidence
#                             (improving | not_improving | single_value)
#   when_context            — extra gate on caller context (e.g. target_framework)
# Empty / "not captured" evidence is always "unknown"; unmatched evidence gets
# the manifest's default_verdict. `label` is the report row title — every
# criterion listed here appears in the Generated Code Quality table even
# before a detector captures evidence for it.
#
# Framework-specific judgments belong in the sibling framework overlays
# (pytorch.yaml, lightning.yaml, ...), which replace whole signals.
signals:
  training_control:
    label: "Conversion: client training/control path"
    rules:
      - contains: "lightning client api patch"
        verdict: good
      - contains: "manual client api loop"
        when_context: {target_framework: lightning}
        verdict: caution
      - contains: "manual client api loop"
        verdict: good
  partitioning:
    label: "Conversion: site data partitioning"
    rules:
      - contains_any: ["seeded shuffled", "stratified seeded"]
        verdict: good
      - contains: "deterministic stride"
        verdict: bad
      - contains: "site partition"
        verdict: caution
  class_weighting:
    label: "Conversion: loss weighting (`pos_weight`)"
    rules:
      - contains_any: ["per-site", "computed from loaded training data"]
        verdict: good
      - contains: "fixed/global"
        verdict: bad
  metric_reporting:
    label: "Conversion: metric implementation/reporting"
    rules:
      - contains_any: ["auroc", "torchmetrics"]
        verdict: good
      - contains: "metric dict"
        verdict: caution
  data_packaging:
    label: "Conversion: data packaging/path"
    rules:
      - contains_any: ["configurable data_root argument", "original data path"]
        verdict: good
      - contains_any: ["ephemeral", "hardcoded absolute data path"]
        verdict: bad
      - contains: "data directory argument"
        verdict: caution
  execution_model:
    label: "Conversion: client execution/model exchange"
    rules:
      - contains_any: ["external client process", "in-process client api executor"]
        verdict: good
  metric_progression:
    label: "Conversion: round metric progression"
    rules:
      - contains: "flat"
        verdict: bad
      - trend: improving
        verdict: good
      - trend: not_improving
        verdict: bad
      - trend: single_value
        verdict: caution
